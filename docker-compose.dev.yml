services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: free-chat-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "8080:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: free-chat-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./dockerenv
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - api_node_modules:/app/node_modules

  postgres:
    image: postgres:16-alpine
    container_name: free-chat-postgres
    restart: unless-stopped
    env_file:
      - ./dockerenv
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  api_node_modules:
  frontend_node_modules:
  postgres_data:
